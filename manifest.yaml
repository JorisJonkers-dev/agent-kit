notes:
  - "This manifest pins the current repo and installer agent surfaces. Repo skills, hooks, hook settings, commands, Spec Kit scaffold seeds, and the installer entrypoint are rendered from agent-kit templates; installer heredoc bodies, including hooks, skills, commands, settings, allowlists, and Spec Kit seeds, are rendered from partial or repo templates."
  - "Repo skill bodies are intentionally agent-specific today; parity means every shared skill has both Claude and Codex targets unless an explicit unsupported reason is present."

