apiVersion: agent-kit.runtime/v1alpha1
kind: AgentRuntimePackage
metadata:
  name: placeholder-agent-runtime
  description: Placeholder-only runtime package contract for agent runner images.
artifact:
  repository: <runtime-home-oci-repository>
  mediaType: <runtime-home-oci-media-type>
  tagPattern: "v{version}"
  releaseAssetPattern: <runtime-home-release-asset-pattern>
  digestAlgorithm: sha256
build:
  containerfile: <runtime-containerfile-path>
  context: <runtime-build-context>
  args:
    AGENT_RUNNER_BASE_IMAGE: <consumer-runner-base-image>
    AGENT_RUNNER_BIN_DIR: <runtime-bin-dir>
    AGENT_MCP_DIR: <runtime-mcp-profile-dir>
  requiredBaseExecutables:
    - <base-runtime-executable>
  requiredAgentExecutables:
    - <agent-cli-executable>
  optionalExecutables:
    - <optional-runtime-executable>
runtime:
  supportedAgents:
    - id: claude
      homeEnv: CLAUDE_CONFIG_DIR
    - id: codex
      homeEnv: CODEX_HOME
    - id: shell
      homeEnv: HOME
  parityPolicy:
    requiresExplicitUnsupportedReason: true
  paths:
    homeEnv: HOME
    workspaceRootEnv: WORKSPACE_ROOT
    sddSourceEnv: AGENT_KIT_SDD_SOURCE
    sddMarkerEnv: AGENT_KIT_SDD_MARKER_FILE
    mcpDirectoryEnv: AGENT_MCP_DIR
  entrypoint:
    path: <runtime-entrypoint-path>
    command:
      - <entrypoint-command>
    environment:
      - name: HOME
        required: true
        description: Runtime home for the non-root agent user.
      - name: CODEX_HOME
        required: true
        description: Codex credential and config home.
      - name: CLAUDE_CONFIG_DIR
        required: true
        description: Claude credential directory.
      - name: WORKSPACE_ROOT
        required: true
        description: Multi-repository workspace root.
    selfTests:
      - agent-kit-manifest
      - repo-allow
      - repo-dir
      - speckit-seed
  repositories:
    primaryUrlEnv: REPO_URL
    primaryBranchEnv: REPO_BRANCH
    additionalUrlsEnv: REPO_URLS
    allowListOutputEnv: REPO_ALLOW
    gitHostEnv: AGENT_GIT_HOST
  githubTokenHelper:
    helperPath: <git-token-helper-path>
    ghWrapperPath: <gh-wrapper-path>
    gitCredentialHelperPath: <git-credential-helper-path>
    mcpWrapperPath: <git-mcp-wrapper-path>
    targetRepoEnv: AGENT_GITHUB_REPO_URL
    tokenUrlEnv: GITHUB_APP_TOKEN_URL
    tokenBearerEnv: GITHUB_APP_TOKEN_BEARER
    hostEnv: AGENT_GIT_HOST
  mcpProfiles:
    profileEnv: AGENT_MCP_PROFILE
    profileDirectoryEnv: AGENT_MCP_DIR
    placeholders:
      - name: KNOWLEDGE_MCP_URL
        env: KB_URL
      - name: KNOWLEDGE_MCP_BEARER_TOKEN
        env: KB_BEARER_TOKEN
      - name: CLUSTER_MCP_URL
        env: AGENT_CLUSTER_MCP_URL
    profiles:
      - name: minimal
        claude: <claude-minimal-mcp-profile>
        codex: <codex-minimal-mcp-profile>
  attachmentProfiles:
    active:
      profiles:
        - minimal
      skillCards:
        - placeholder-routing-card
      fullSkills:
        - placeholder-skill
    profiles:
      - name: minimal
        mcpProfile: minimal
        skillCards:
          - name: placeholder-routing-card
            purpose: Route focused placeholder work to the minimal runtime profile.
            positiveTriggers:
              - Placeholder runtime metadata needs attachment-card validation.
              - Manifest validation should exercise MCP profile references.
            negativeTriggers:
              - The fixture is used only for Kubernetes non-deployable checks.
              - No attachment metadata is being parsed by the current validation.
            requiredMcpProfile: minimal
            risk: low
            expectedOutputs:
              - Placeholder routing decision for the runtime package fixture.
              - Validation evidence that the attachment profile shape is accepted.
        fullSkills:
          - placeholder-skill
  sddSeed:
    sourcePathEnv: AGENT_KIT_SDD_SOURCE
    markerFileEnv: AGENT_KIT_SDD_MARKER_FILE
    updatePolicy: update-if-unmodified
handoff:
  platformBlueprintResponsibilities:
    - namespace
    - service-account-and-rbac
    - credential-persistence
    - secret-projection
    - bootstrap-and-refresh-schedules
    - runner-pod-factory
    - scheduling-and-security-context
    - network-policy
    - observability
  forbiddenRuntimeDefaults:
    - concrete-domain
    - concrete-hostname
    - concrete-ip
    - concrete-namespace
    - concrete-image-prefix
    - concrete-secret-path
    - concrete-kb-endpoint
