apiVersion: agent-kit.extratoast.dev/v1alpha1
kind: AgentRuntimePackage
metadata:
  name: placeholder-agent-runtime
  description: Placeholder-only runtime package contract for agent runner images.
  labels:
    portability: design-first
runtime:
  supportedAgents:
    - id: claude
      homeEnv: CLAUDE_CONFIG_DIR
    - id: codex
      homeEnv: CODEX_HOME
    - id: shell
      homeEnv: HOME
  parityPolicy:
    requiresExplicitUnsupportedReason: true
  paths:
    home: <agent-home>
    workspaceRoot: <workspace-root>
    agentKitSeedSource: <image-path-to-agent-kit-sdd-seed>
  entrypoint:
    command:
      - <entrypoint-command>
    environment:
      - name: HOME
        required: true
        description: Runtime home for the non-root agent user.
      - name: CODEX_HOME
        required: true
        description: Codex credential and config home.
      - name: CLAUDE_CONFIG_DIR
        required: true
        description: Claude credential directory.
      - name: WORKSPACE_ROOT
        required: true
        description: Multi-repository workspace root.
      - name: AGENT_KIT_EXPECTED_VERSION
        required: false
        description: Expected installed agent-kit version marker.
      - name: AGENT_MCP_PROFILE
        required: false
        description: MCP profile selector.
    selfTests:
      - agent-kit-manifest
      - repo-allow
      - repo-dir
      - speckit-seed
  repositories:
    primaryUrlEnv: REPO_URL
    primaryBranchEnv: REPO_BRANCH
    additionalUrlsEnv: REPO_URLS
    allowListOutputEnv: REPO_ALLOW
  mcpProfiles:
    profileEnv: AGENT_MCP_PROFILE
    profileDirectoryEnv: AGENT_MCP_DIR
    profiles:
      - minimal
      - code-intel
      - cluster
      - full-diagnostic
    serverUrlPlaceholders:
      - <knowledge-mcp-url>
      - <optional-cluster-mcp-url>
      - <optional-code-intel-mcp-command>
    bearerTokenEnvVars:
      - <knowledge-mcp-bearer-env>
  credentials:
    - id: claude-home
      mountPath: <agent-home>/.claude
      writable: true
      providedBy: platform-blueprints
    - id: codex-home
      mountPath: <agent-home>/.codex
      writable: true
      providedBy: platform-blueprints
    - id: git-ssh-material
      mountPath: <secret-mount-path>
      writable: false
      providedBy: platform-blueprints
  tooling:
    requiredExecutables:
      - bash
      - git
      - jq
      - ssh
      - tmux
      - claude
      - codex
    optionalExecutables:
      - gh
      - docker
      - playwright-mcp
      - github-mcp-server
  sddSeed:
    sourcePath: <image-path-to-agent-kit-sdd-seed>
    markerFile: <sdd-seed-marker-file>
    updatePolicy: update-if-unmodified
handoff:
  platformBlueprintResponsibilities:
    - namespace
    - service-account-and-rbac
    - credential-persistence
    - secret-projection
    - bootstrap-and-refresh-schedules
    - runner-pod-factory
    - scheduling-and-security-context
    - network-policy
    - observability
  forbiddenRuntimeDefaults:
    - concrete-domain
    - concrete-hostname
    - concrete-ip
    - concrete-namespace
    - concrete-image-prefix
    - concrete-secret-path
    - concrete-kb-endpoint
