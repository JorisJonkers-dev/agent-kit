apiVersion: agent-kit.runtime/v1alpha1
kind: AgentRuntimePackage
metadata:
  name: portable-agent-runner
  description: Portable runtime packaging contract rendered by agent-kit.
artifact:
  repository: ghcr.io/jorisjonkers-dev/agent-kit/runtime-home
  mediaType: application/vnd.jorisjonkers.agent-kit.runtime-home.v1.tar+gzip
  tagPattern: "v{version}"
  releaseAssetPattern: "agent-kit-runtime-home-v{version}.tar.gz"
  digestAlgorithm: sha256
build:
  containerfile: runner-manifests/runtime/Containerfile
  context: runner-manifests/runtime
  args:
    AGENT_RUNNER_BASE_IMAGE: <consumer-runner-base-image>
    AGENT_RUNNER_BIN_DIR: <runtime-bin-dir>
    AGENT_MCP_DIR: <runtime-mcp-profile-dir>
  requiredBaseExecutables:
    - awk
    - bash
    - basename
    - cp
    - date
    - find
    - git
    - jq
    - mktemp
    - node # >=22
    - sed
    - sha256sum
    - sh
    - ssh
    - tar
    - tmux
  requiredAgentExecutables:
    - claude
    - codex
  optionalExecutables:
    - curl
    - gh
    - github-mcp-server
    - playwright-mcp
    - serena
runtime:
  supportedAgents:
    - id: claude
      homeEnv: CLAUDE_CONFIG_DIR
      configFile: <home-dir>/.claude.json
    - id: codex
      homeEnv: CODEX_HOME
      configFile: <codex-home>/config.toml
    - id: shell
      homeEnv: HOME
  parityPolicy:
    requiresExplicitUnsupportedReason: true
  paths:
    homeEnv: HOME
    workspaceRootEnv: WORKSPACE_ROOT
    sddSourceEnv: AGENT_KIT_SDD_SOURCE
    sddMarkerEnv: AGENT_KIT_SDD_MARKER_FILE
    mcpDirectoryEnv: AGENT_MCP_DIR
  entrypoint:
    path: runner-manifests/runtime/entrypoint.sh
    command:
      - agent-runner-entrypoint
    environment:
      - name: HOME
        required: true
        description: Runtime home for the non-root agent user.
      - name: CODEX_HOME
        required: true
        description: Codex credential and config home.
      - name: CLAUDE_CONFIG_DIR
        required: true
        description: Claude credential directory.
      - name: WORKSPACE_ROOT
        required: true
        description: Multi-repository workspace root.
      - name: AGENT_KIT_EXPECTED_VERSION
        required: false
        description: Expected installed agent-kit version marker.
      - name: AGENT_RUNNER_ENTRYPOINT_SELF_TEST
        required: false
        description: Selects a local entrypoint self-test and exits before launching the workload.
    selfTests:
      - agent-kit-manifest
      - repo-allow
      - repo-dir
      - speckit-seed
  repositories:
    primaryUrlEnv: REPO_URL
    primaryBranchEnv: REPO_BRANCH
    additionalUrlsEnv: REPO_URLS
    additionalUrlFormat: "url[#branch], separated by whitespace, semicolon, or newline"
    allowListOutputEnv: REPO_ALLOW
    gitHostEnv: AGENT_GIT_HOST
    trust:
      gitSafeDirectory: true
      claudeProjectTrust: true
      codexProjectTrust: true
  githubTokenHelper:
    helperPath: runner-manifests/runtime/bin/agent-github-token
    ghWrapperPath: runner-manifests/runtime/bin/gh-wrapper
    gitCredentialHelperPath: runner-manifests/runtime/bin/git-credential-agent-gh-app
    mcpWrapperPath: runner-manifests/runtime/bin/gh-mcp-wrapper
    targetRepoEnv: AGENT_GITHUB_REPO_URL
    tokenUrlEnv: GITHUB_APP_TOKEN_URL
    tokenBearerEnv: GITHUB_APP_TOKEN_BEARER
    hostEnv: AGENT_GIT_HOST
    preseededTokenEnv:
      - GH_TOKEN
      - GITHUB_PERSONAL_ACCESS_TOKEN
    cacheDirEnv: GH_APP_TOKEN_CACHE_DIR
    cacheFileEnv: GH_APP_TOKEN_CACHE
  mcpProfiles:
    profileEnv: AGENT_MCP_PROFILE
    profileDirectoryEnv: AGENT_MCP_DIR
    claudeOverrideEnv: AGENT_MCP_SERVERS_FILE
    codexOverrideEnv: AGENT_CODEX_MCP_FILE
    placeholders:
      - name: KNOWLEDGE_MCP_URL
        env: KB_URL
      - name: KNOWLEDGE_MCP_BEARER_TOKEN
        env: KB_BEARER_TOKEN
      - name: CLUSTER_MCP_URL
        env: AGENT_CLUSTER_MCP_URL
      - name: FRONTEND_DOCS_MCP_URL
        env: AGENT_FRONTEND_DOCS_MCP_URL
      - name: UI_DOCS_MCP_URL
        env: AGENT_UI_DOCS_MCP_URL
    profiles:
      - name: minimal
        claude: runner-manifests/runtime/mcp/claude-mcp-servers.minimal.json
        codex: runner-manifests/runtime/mcp/codex-mcp-servers.minimal.toml
      - name: frontend
        claude: runner-manifests/runtime/mcp/claude-mcp-servers.frontend.json
        codex: runner-manifests/runtime/mcp/codex-mcp-servers.frontend.toml
      - name: cluster
        claude: runner-manifests/runtime/mcp/claude-mcp-servers.cluster.json
        codex: runner-manifests/runtime/mcp/codex-mcp-servers.cluster.toml
      - name: code-intel
        claude: runner-manifests/runtime/mcp/claude-mcp-servers.code-intel.json
        codex: runner-manifests/runtime/mcp/codex-mcp-servers.code-intel.toml
      - name: full-diagnostic
        claude: runner-manifests/runtime/mcp/claude-mcp-servers.full-diagnostic.json
        codex: runner-manifests/runtime/mcp/codex-mcp-servers.full-diagnostic.toml
  attachmentProfiles:
    active:
      profiles:
        - minimal
      skillCards:
        - kb-recall
        - validation-runner
      fullSkills:
        - kb-first
        - run-tests
    profiles:
      - name: minimal
        mcpProfile: minimal
        skillCards:
          - name: kb-recall
            purpose: Recall focused knowledge before changing durable behavior.
            positiveTriggers:
              - Durable architecture or workflow behavior may depend on prior decisions.
              - Repository conventions or captured lessons could change the implementation approach.
            negativeTriggers:
              - The request is a formatting-only edit with no behavior change.
              - The needed context is already present in the current files and prompt.
            requiredMcpProfile: minimal
            risk: medium
            expectedOutputs:
              - Short summary of relevant recalled context and source note identifiers.
              - Explicit statement when no useful prior context was found.
          - name: validation-runner
            purpose: Select and run the required local validation commands.
            positiveTriggers:
              - User acceptance criteria include named test, typecheck, lint, or render commands.
              - Runtime manifests, generator output, or validation scripts have changed.
            negativeTriggers:
              - The turn is a read-only code explanation or status request.
              - No repository files or generated artifacts were changed.
            requiredMcpProfile: minimal
            risk: low
            expectedOutputs:
              - Exact commands executed and their pass or fail status.
              - Clear blocker report for missing local dependencies or permissions.
        fullSkills:
          - kb-first
          - run-tests
          - topics
      - name: frontend
        mcpProfile: frontend
        skillCards:
          - name: frontend-docs
            purpose: Check UI framework docs and browser behavior for frontend changes.
            positiveTriggers:
              - Frontend work depends on current framework, browser, or component behavior.
              - Visual verification needs Playwright, UI docs, or frontend-specific MCP services.
            negativeTriggers:
              - The change is backend-only or limited to non-UI manifest metadata.
              - The required frontend behavior is already covered by local tests and code.
            requiredMcpProfile: frontend
            risk: medium
            expectedOutputs:
              - Source-backed frontend guidance that applies to the changed surface.
              - Browser or screenshot verification notes when visual behavior is affected.
        fullSkills:
          - add-public-service
          - token-economy
      - name: cluster
        mcpProfile: cluster
        skillCards:
          - name: cluster-runtime
            purpose: Inspect cluster-facing runtime assumptions before platform changes.
            positiveTriggers:
              - Work changes fleet, runtime, ingress, or Kubernetes-facing contracts.
              - Validation requires comparing rendered output with cluster or platform state.
            negativeTriggers:
              - The task is confined to local TypeScript domain logic.
              - The platform contract is explicitly out of scope for the turn.
            requiredMcpProfile: cluster
            risk: high
            expectedOutputs:
              - Cluster-aware impact summary for changed runtime or platform contracts.
              - Validation commands or blockers for fleet and platform render checks.
        fullSkills:
          - fleet-change
          - add-public-service
      - name: code-intel
        mcpProfile: code-intel
        skillCards:
          - name: code-intel-survey
            purpose: Use code intelligence for broad symbol and dependency exploration.
            positiveTriggers:
              - The change crosses multiple modules, contexts, or dependency boundaries.
              - Symbol-level navigation is needed to avoid duplicating sibling work.
            negativeTriggers:
              - A narrow file read gives enough context for the requested edit.
              - The affected code is generated or declarative metadata only.
            requiredMcpProfile: code-intel
            risk: medium
            expectedOutputs:
              - Focused map of relevant symbols, boundaries, and dependency constraints.
              - Specific files or barrels that need updates for the implementation.
        fullSkills:
          - council-supervise
          - claude-worker
      - name: full-diagnostic
        mcpProfile: full-diagnostic
        skillCards:
          - name: full-diagnostic-grill
            purpose: Stress-test high-risk plans with all runtime diagnostics available.
            positiveTriggers:
              - The implementation spans runtime, frontend, cluster, and code-intel concerns.
              - A design or patch needs adversarial review before merge.
            negativeTriggers:
              - The task is routine and has a complete local validation path.
              - The additional diagnostics would not change the implementation decision.
            requiredMcpProfile: full-diagnostic
            risk: high
            expectedOutputs:
              - Concrete risk findings tied to files, commands, or acceptance criteria.
              - Recommendation to proceed, amend, or split based on validated evidence.
        fullSkills:
          - council-triage
          - council-grill
  sddSeed:
    sourcePathEnv: AGENT_KIT_SDD_SOURCE
    markerFileEnv: AGENT_KIT_SDD_MARKER_FILE
    updatePolicy: update-if-unmodified
  homeBundle:
    archiveRoot: "."
    homeSource: "home"
    sddSource: "sdd"
    mcpSource: "mcp"
    markerFile: ".agent-kit-home-install.sha256"
    versionMarkerFile: ".knowledge-system-version"
    installPolicy: "update-if-unmodified"
    preserveCredentialFiles:
      - ".claude/.credentials.json"
      - ".codex/auth.json"
      - ".codex/config.toml"
handoff:
  platformBlueprintResponsibilities:
    - namespace
    - service-account-and-rbac
    - credential-persistence
    - secret-projection
    - bootstrap-and-refresh-schedules
    - runner-pod-factory
    - scheduling-and-security-context
    - network-policy
    - observability
  forbiddenRuntimeDefaults:
    - concrete-domain
    - concrete-hostname
    - concrete-ip
    - concrete-namespace
    - concrete-image-prefix
    - concrete-secret-path
    - concrete-kb-endpoint
