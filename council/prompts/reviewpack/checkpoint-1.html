<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #18202b;
      --muted: #5d6878;
      --line: #dce1ea;
      --accent: #1b6fb8;
      --ok: #177245;
      --warn: #a05a00;
      --bad: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.18;
    }

    h1 {
      font-size: 2rem;
      font-weight: 760;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 1.18rem;
    }

    h3 {
      font-size: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: .9rem;
      text-align: right;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 16px;
    }

    .panel {
      grid-column: span 12;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      overflow: hidden;
    }

    .panel.half {
      grid-column: span 6;
    }

    .panel.third {
      grid-column: span 4;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fbfcfe;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .92rem;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 650;
      background: #f2f5f9;
    }

    code,
    pre {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    pre {
      margin: 0;
      padding: 14px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101822;
      color: #ecf3ff;
      font-size: .85rem;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f5f7fa;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 650;
      white-space: nowrap;
    }

    .ok {
      color: var(--ok);
    }

    .warn {
      color: var(--warn);
    }

    .bad {
      color: var(--bad);
    }

    @media (max-width: 760px) {
      main {
        padding: 24px 14px 36px;
      }

      header {
        display: block;
      }

      .meta {
        margin-top: 8px;
        text-align: left;
        white-space: normal;
      }

      .panel.half,
      .panel.third {
        grid-column: span 12;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <span class="pill">Gate 1</span>
        <h1>{{title}}</h1>
      </div>
      <div class="meta">{{generated_at}}</div>
    </header>

    <section class="grid" aria-label="Checkpoint 1 review pack">
      <article class="panel half">
        <h2>Routing Verdict</h2>
        <div class="stack">{{routing_verdicts}}</div>
      </article>

      <article class="panel half">
        <h2>Spend Estimate</h2>
        {{spend_estimate}}
      </article>

      <article class="panel">
        <h2>Task DAG By Depth</h2>
        <div class="stack">{{dag_by_depth}}</div>
      </article>

      <article class="panel half">
        <h2>Stories</h2>
        <div class="stack">{{story_cards}}</div>
      </article>

      <article class="panel half">
        <h2>Grill Ledger</h2>
        {{grill_ledger}}
      </article>

      <article class="panel">
        <h2>Source Data</h2>
        <pre>{{raw_json}}</pre>
      </article>
    </section>
  </main>
</body>
</html>
